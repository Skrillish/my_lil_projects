<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container" style="width: 800px;">
        <div id="main" class="carousel slide" data-bs-ride="carousel">
            <!--indicators/dots-->
            <div class="carousel-indicators">
                <button data-bs-target="#main" data-bs-slide-to="0" class="active"></button>
                <button data-bs-target="#main" data-bs-slide-to="1"></button>
                <button data-bs-target="main" data-bs-slide-to="2"></button>
                <button data-bs-target="main" data-bs-slide-to="3"></button>
                <button data-bs-target="main" data-bs-slide-to="4"></button>
                <button data-bs-target="main" data-bs-slide-to="5"></button>
            </div>

            <!--main slide pictures with captions-->
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/gallery/01.jpg">
                    <div class="carousel-caption">
                        <h3>Big DvD5</h3>
                        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eveniet hic nisi porro est vitae aperiam recusandae, repellendus vel magni eaque inventore eum rerum similique dolores dignissimos totam quia. Velit, nam.</p>
                    </div>
                </div>

                 <div class="carousel-item">
                    <img src="images/gallery/02.jpg">
                </div>
                
                 <div class="carousel-item">
                    <img src="images/gallery/03.jpg">
                </div>

                 <div class="carousel-item">
                    <img src="images/gallery/04.jpg">
                </div>

                 <div class="carousel-item">
                    <img src="images/gallery/05.jpg">
                </div>

                 <div class="carousel-item">
                    <img src="images/gallery/06.jpg">
                </div>
            </div>

            <!--prev & next arrow-->
            <button class="carousel-control-prev" data-bs-target="#main" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" data-bs-target="#main" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>


    </div>
 
   
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
