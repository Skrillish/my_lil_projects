<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container my-5">
        <div class="progress">
            <div class="progress-bar"></div>
        </div><br>

        <div class="progress">
            <div class="progress-bar" style="width: 25%;"></div>
        </div><br>

        <div class="progress">
            <div class="progress-bar" style="width: 50%;"></div>
        </div><br>

        <div class="progress">
            <div class="progress-bar" style="width: 75%;"></div>
        </div><br>
    </div>

    <div class="container my-5">
        <div class="progress">
            <div class="progress-bar"></div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-dark" style="width: 20%;">20</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-info" style="width: 30%;">30</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-warning" style="width: 40%;">40</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-danger" style="width: 50%;">50</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-primary" style="width: 60%;">60</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-success" style="width: 70%;">70</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-danger" style="width: 80%;">80</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-primary" style="width: 90%;">90</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-success" style="width: 100%;">100</div>
        </div><br>
    </div>


    <div class="container my-5">
        <div class="progress">
            <div class="progress-bar bg-dark progress-bar-striped progress-bar-animated" style="width: 10%;">10</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-dark progress-bar-striped progress-bar-animated" style="width: 20%;">20</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-info  progress-bar-striped progress-bar-animated" style="width: 30%;">30</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" style="width: 40%;">40</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-danger progress-bar-striped progress-bar-animated" style="width: 50%;">50</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 60%;">60</div>
        </div><br>

        <div class="progress">
            <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width: 70%;">70</div>
        </div><br>

         <div class="progress">
            <div class="progress-bar bg-danger progress-bar-striped progress-bar-animated" style="width: 80%;">80</div>
        </div><br>

         <div class="progress">
            <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" style="width: 90%;">90</div>
        </div><br>

         <div class="progress">
            <div class="progress-bar bg-dark progress-bar-striped progress-bar-animated" style="width: 100%;">100</div>
        </div><br>
    </div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
