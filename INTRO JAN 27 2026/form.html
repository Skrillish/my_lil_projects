<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container my-5 p-5 bg-light rounded-3 border border-1 border-secondary" style="width: 700px;">
        <h2>Stacked Form</h2>
        <form>
            <div class="my-3">
                <label class="form-label">First Name</label>
                <input type="text" placeholder="enter first name" class="form-control">
            </div>
    
            <div class="my-3">
                <label class="form-label">Middle Name</label>
                <input type="text" placeholder="enter middle name" class="form-control">
            </div>
    
            <div class="my-3">
                <label class="form-label">Last Name</label>
                <input type="text" placeholder="enter last name" class="form-control">
            </div>
    
            <div class="my-3">
                <label class="form-label">Email</label>
                <input type="email" placeholder="enter email" class="form-control">
            </div>
    
            <div class="my-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" placeholder="enter phone number" class="form-control">
            </div>
    
            <div class="my-3">
                <label class="form-label">Comments</label>
                <textarea class="form-control" rows="5"></textarea>
            </div>
    
            <div class="my-3 form-check">
                <label class="form-check-label">
                    <input type="checkbox" class="form-check-input"> Remember me
                </label>
            </div>
    
            <button class="btn btn-dark" type="submit">Register</button>
            <button class="btn btn-outline-dark" type="reset">Reset</button>
        </form>
    </div>

    <div class="container my-5 p-5 bg-light rounded-3 border border-1 border-secondary" style="width: 700px;">
        <h2>Floating Form</h2>
        <form>
            <div class="form-floating my-3">
                <input type="text" class="form-control" placeholder="nothing">
                <label>First Name</label>
            </div>
    
            <div class="form-floating my-3">
                <input type="text" class="form-control" placeholder="nothing">
                <label>Middle Name</label>
            </div>
    
            <div class="form-floating my-3">
                <input type="text" class="form-control" placeholder="nothing">
                <label>Last Name</label>
            </div>
    
            <div class="form-floating my-3">
                <input type="email" class="form-control" placeholder="nothing">
                <label>Email</label>
            </div>
    
            <div class="form-floating my-3">
                <input type="tel" class="form-control" placeholder="nothing">
                <label>Phone Number</label>
            </div>
        </form>
    </div>

    <div class="container my-5 p-5 bg-light rounded-3 border border-1 border-secondary" style="width: 700px;">
        <h2>validated Form</h2>
        <form class="was-validated">
            <div class="my-3">
                <label class="form-label">First Name</label>
                <input type="text" placeholder="enter first name" class="form-control" required>
                <div class="invalid-feedback">Please fill out this field to continue</div>
                <div class="valid-feedback">great job</div>
            </div>
    
            <div class="my-3">
                <label class="form-label">Middle Name</label>
                <input type="text" placeholder="enter middle name" class="form-control" required>
            </div>
    
            <div class="my-3">
                <label class="form-label">Last Name</label>
                <input type="text" placeholder="enter last name" class="form-control" required>
            </div>
    
            <div class="my-3">
                <label class="form-label">Email</label>
                <input type="email" placeholder="enter email" class="form-control" required>
            </div>
    
            <div class="my-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" placeholder="enter phone number" class="form-control" required>
            </div>
    
            <div class="my-3">
                <label class="form-label">Comments</label>
                <textarea class="form-control" rows="5" required></textarea>
            </div>
    
            <div class="my-3 form-check">
                <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" required> Remember me
                </label>
            </div>
    
            <button class="btn btn-dark" type="submit">Register</button>
            <button class="btn btn-outline-dark" type="reset">Reset</button>
        </form>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
